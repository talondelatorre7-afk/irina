<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <title>Content Manager</title>
</head>

<body>
    <script src="https://unpkg.com/decap-cms@^3.3.0/dist/decap-cms.js"></script>

    <script>
        const BlogPreview = createClass({
            render: function () {
                const entry = this.props.entry;
                const title = entry.getIn(['data', 'title']);
                const author = entry.getIn(['data', 'author']);
                const rawDate = entry.getIn(['data', 'date']);
                const image = entry.getIn(['data', 'image']);
                
                // Safe date handling
                const date = typeof rawDate === "string" ? new Date(rawDate) : rawDate;
                let formattedDate = "";
                if (date && !isNaN(date.valueOf())) {
                    formattedDate = Intl.DateTimeFormat("en-US", {
                        month: "long",
                        day: "numeric",
                        year: "numeric"
                    }).format(date);
                }

                // Safe image handling
                const cover = this.props.getAsset(image);

                // Using standard React rendering (h) instead of JSX to prevent crashes
                return h('div', { className: "blog" },
                    h('h1', { className: "title" }, title),
                    h('div', { className: "metadata" },
                        h('span', { className: "author" }, author),
                        h('span', { className: "dot" }),
                        h('span', { className: "date" }, formattedDate)
                    ),
                    cover ? h('img', { src: cover.toString(), className: "cover", alt: "Cover" }) : null,
                    h('hr', { className: "divider" }),
                    h('div', { className: "markdown" }, this.props.widgetFor("body"))
                );
            }
        });

        // Register the elements and styles for the "blog" collection
        CMS.registerPreviewTemplate("blog", BlogPreview);
        CMS.registerPreviewStyle("/admin/decap-preview-styles.css");
    </script>
</body>

</html>
